name: Publish to Chrome Web Store

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Publish channel: "public" or "trusted_testers"'
        required: true
        default: public
      deploy_percentage:
        description: "Rollout percentage (public channel only)"
        required: true
        default: "100"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gemini-nexus/package-lock.json

      - name: Install
        working-directory: gemini-nexus
        run: npm ci

      - name: Build extension dist/
        working-directory: gemini-nexus
        run: npm run build:extension

      - name: Upload to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          npx -y chrome-webstore-upload-cli upload --source gemini-nexus/dist

      - name: Publish (trusted testers)
        if: inputs.channel == 'trusted_testers'
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          npx -y chrome-webstore-upload-cli publish --trusted-testers

      - name: Publish (public)
        if: inputs.channel == 'public'
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          npx -y chrome-webstore-upload-cli publish --deploy-percentage "${{ inputs.deploy_percentage }}"

