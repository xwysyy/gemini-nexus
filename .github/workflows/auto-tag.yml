name: Auto Tag on Version Commit

on:
  push:
    branches:
      - main

jobs:
  tag:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tag if commit message contains version
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");

            const message = context.payload.head_commit?.message ?? "";
            const manifest = JSON.parse(
              fs.readFileSync("gemini-nexus/manifest.json", "utf8"),
            );

            const manifestVersion = manifest.version;

            const candidates = Array.from(
              message.matchAll(/\bv?(\d+\.\d+\.\d+(?:\.\d+)?)\b/g),
            ).map((m) => m[1]);

            if (!candidates.includes(manifestVersion)) {
              if (candidates.length > 0) {
                core.info(
                  `Commit message contains version(s) [${candidates.join(", ")}] but none match manifest version (${manifestVersion}); skipping.`,
                );
              } else {
                core.info(
                  "No version like X.Y.Z or vX.Y.Z found in the head commit message; skipping.",
                );
              }
              return;
            }

            const tag = `v${manifestVersion}`;

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = `tags/${tag}`;

            try {
              await github.rest.git.getRef({ owner, repo, ref });
              core.info(`Tag ${tag} already exists; skipping.`);
              return;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/${ref}`,
              sha: context.sha,
            });

            core.notice(`Created tag ${tag} at ${context.sha}. This will trigger the release workflow.`);
