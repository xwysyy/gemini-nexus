name: Auto Release on Manifest Version Change

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect version change and create tag
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            core.setOutput("should_release", "false");

            async function getManifestVersion(ref) {
              try {
                const response = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: "gemini-nexus/manifest.json",
                  ref,
                });

                const data = response.data;
                if (!data || Array.isArray(data)) return null;
                if (data.type !== "file") return null;
                if (!data.content || data.encoding !== "base64") return null;

                const json = Buffer.from(data.content, "base64").toString("utf8");
                const manifest = JSON.parse(json);
                return manifest?.version ?? null;
              } catch (error) {
                if (error.status === 404) return null;
                throw error;
              }
            }

            const beforeSha = context.payload.before;
            const afterSha = context.sha;

            const beforeIsZero = typeof beforeSha === "string" && /^0+$/.test(beforeSha);
            const beforeVersion = beforeIsZero ? null : await getManifestVersion(beforeSha);
            const afterVersion = await getManifestVersion(afterSha);

            if (!afterVersion) {
              core.setFailed("Unable to read gemini-nexus/manifest.json version at the pushed commit.");
              return;
            }

            const chromeVersionPattern = /^\d+(\.\d+){0,3}$/;
            if (!chromeVersionPattern.test(afterVersion)) {
              core.setFailed(
                `manifest.json version "${afterVersion}" is not a valid Chrome extension version (expected 1-4 dot-separated integers).`,
              );
              return;
            }

            if (beforeVersion === afterVersion) {
              core.info(`manifest.json version unchanged (${afterVersion}); skipping.`);
              return;
            }

            core.notice(
              `manifest.json version changed: ${beforeVersion ?? "(none)"} -> ${afterVersion}`,
            );

            const tag = `v${afterVersion}`;
            const ref = `tags/${tag}`;

            try {
              const existing = await github.rest.git.getRef({ owner, repo, ref });
              const existingSha = existing?.data?.object?.sha;
              if (existingSha === afterSha) {
                core.info(`Tag ${tag} already exists at ${afterSha}; skipping.`);
                return;
              }
              core.setFailed(
                `Tag ${tag} already exists (at ${existingSha}). Bump the version in manifest.json before releasing.`,
              );
              return;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/${ref}`,
              sha: context.sha,
            });

            core.notice(
              `Created tag ${tag} at ${context.sha}. Continuing with build and release.`,
            );

            core.setOutput("should_release", "true");
            core.setOutput("version", afterVersion);
            core.setOutput("tag", tag);

      - name: Setup Node
        if: steps.version.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gemini-nexus/package-lock.json

      - name: Install
        if: steps.version.outputs.should_release == 'true'
        working-directory: gemini-nexus
        run: npm ci

      - name: Build & Package
        if: steps.version.outputs.should_release == 'true'
        working-directory: gemini-nexus
        run: npm run package

      - name: Upload artifact
        if: steps.version.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gemini-nexus-zip-${{ steps.version.outputs.version }}
          path: gemini-nexus/release/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: steps.version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: gemini-nexus/release/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
